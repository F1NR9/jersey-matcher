name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
        # 验证Cython安装
        cython --version
    
    - name: Create buildozer.spec
      run: |
        # 确保文件被完全覆盖
        rm -f buildozer.spec
        echo '[app]' > buildozer.spec
        echo 'title = 球衣款式匹配系统' >> buildozer.spec
        echo 'package.name = jersey_matcher' >> buildozer.spec
        echo 'package.domain = org.kivy' >> buildozer.spec
        echo 'source.dir = .' >> buildozer.spec
        echo 'source.include_exts = py,png,jpg,kv,atlas' >> buildozer.spec
        echo 'version = 0.1' >> buildozer.spec
        echo 'requirements = python3,kivy,opencv,numpy,scikit-learn,faiss-cpu' >> buildozer.spec
        echo 'orientation = portrait' >> buildozer.spec
        echo 'fullscreen = 0' >> buildozer.spec
        echo 'android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE, CAMERA' >> buildozer.spec
        echo 'android.archs = armeabi-v7a' >> buildozer.spec
        echo '' >> buildozer.spec
        echo '[buildozer]' >> buildozer.spec
        echo 'log_level = 2' >> buildozer.spec
        echo 'warn_on_root = 1' >> buildozer.spec
        # 显示文件内容以验证
        cat buildozer.spec
    
    - name: Install buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libncurses5-dev libncursesw5-dev libz-dev libssl-dev libxml2-dev libxslt1-dev libffi-dev libsqlite3-dev libbz2-dev
        sudo apt-get install -y openjdk-11-jdk
        sudo apt-get install -y zipalign
        sudo apt-get install -y apktool
        sudo apt-get install -y wget unzip
        
        # Install Android SDK
        mkdir -p ~/Android/Sdk
        cd ~/Android/Sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
        unzip commandlinetools-linux-10406996_latest.zip
        rm commandlinetools-linux-10406996_latest.zip
        
        # Set up SDK environment
        export ANDROID_HOME=~/Android/Sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/30.0.3
        
        # Install SDK components
        yes | ~/Android/Sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
    
    - name: Build APK
      run: |
        export ANDROID_HOME=~/Android/Sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/30.0.3
        # 确保使用正确的Python环境
        export PATH=$PATH:~/.local/bin
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jersey-matcher-apk
        path: bin/*.apk
