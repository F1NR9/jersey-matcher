name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    
    - name: Configure buildozer spec
      run: |
        # 创建正确格式的buildozer.spec文件
        cat > buildozer.spec << EOF
[app]
title = 球衣款式匹配系统
package.name = jersey_matcher
package.domain = org.kivy
source.dir = .
source.include_exts = py,png,jpg,kv,atlas
version = 0.1
requirements = python3,kivy,opencv,numpy,scikit-learn,faiss-cpu
orientation = portrait
fullscreen = 0
android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE, CAMERA
android.archs = armeabi-v7a

[buildozer]
log_level = 2
warn_on_root = 1
EOF
    
    - name: Install buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libncurses5-dev libncursesw5-dev libz-dev libssl-dev libxml2-dev libxslt1-dev libffi-dev libsqlite3-dev libbz2-dev
        sudo apt-get install -y openjdk-11-jdk
        sudo apt-get install -y zipalign
        sudo apt-get install -y apktool
        sudo apt-get install -y android-sdk-build-tools
    
    - name: Build APK
      run: buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jersey-matcher-apk
        path: bin/*.apk
